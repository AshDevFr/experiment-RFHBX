name: Docker Compose Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: docker-smoke-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  smoke-test:
    name: Docker Compose Integration
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build all Docker images
        run: docker compose build

      - name: Pull infrastructure images
        # postgres, redis, and elasticmq have no build context so they are
        # not pulled by `docker compose build`. Pull them explicitly here so
        # image-pull time is not charged against the health-check timeout.
        run: docker compose pull postgres redis elasticmq

      - name: Start infrastructure services
        # Start only the stateful infrastructure services first. App services
        # (backend, sidekiq, …) depend on these being healthy before they can
        # start, so we bring infra up separately and wait for it below.
        run: docker compose up -d postgres redis elasticmq

      - name: Wait for infrastructure services to be healthy
        run: |
          echo "Waiting for postgres and redis to be healthy..."
          for svc in postgres redis; do
            echo "  $svc: waiting..."
            timeout 300 bash -c "
              until docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{end}}' \$(docker compose ps -q $svc) 2>/dev/null | grep -q healthy; do
                sleep 3
              done
            "
            echo "  $svc: healthy ✓"
          done

          # elasticmq-native has no shell utilities so Docker healthcheck is
          # not possible. Poll the management UI from the host instead.
          # Note: The SQS API on port 9324 returns non-2xx for bare GET /
          # (it expects AWS query parameters), so we poll the management UI
          # on port 9325 which returns HTTP 200 for GET /.
          echo "  elasticmq: waiting (host-side HTTP poll on management UI)..."
          timeout 300 bash -c '
            until curl -sf http://localhost:9325 > /dev/null 2>&1; do
              sleep 3
            done
          '
          echo "  elasticmq: ready ✓"

      - name: Start application services
        # With infra already healthy, start the full stack. docker compose up -d
        # will block here until the backend's /api/health check passes (sidekiq
        # depends on service_healthy for backend). On a cold-start CI runner this
        # can take a few minutes (bundle check + db:prepare + Rails boot).
        # We use || true so a transient failure falls through to the
        # "Wait for backend" retry step rather than aborting the job.
        run: docker compose up -d 2>&1 || true

      - name: Wait for backend to be ready
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 8
          max_attempts: 3
          retry_on: error
          on_retry_command: |
            docker compose down -v
            # Restart infra and wait for postgres to be healthy BEFORE starting
            # app services — the backend entrypoint exits with an error if it
            # can't reach postgres (set -e + connection check), which would mark
            # the backend as unhealthy and block sidekiq from starting.
            docker compose up -d postgres redis elasticmq
            echo "Waiting for postgres to be healthy before starting app services..."
            timeout 120 bash -c '
              until docker inspect \
                --format="{{if .State.Health}}{{.State.Health.Status}}{{end}}" \
                "$(docker compose ps -q postgres)" 2>/dev/null | grep -q healthy; do
                sleep 3
              done
            '
            docker compose up -d 2>&1 || true
          command: |
            echo "Waiting for backend (entrypoint: bundle install + db:prepare + server start)..."
            until curl -sf http://localhost:3000/api/health > /dev/null 2>&1; do
              # Bail immediately if the backend container has exited unexpectedly
              # (e.g. a failed bundle install, db:prepare error, or crash at boot).
              # Without this check the loop spins silently for the full timeout,
              # making a crash look like a timeout.
              if [ -n "$(docker compose ps --status exited -q backend 2>/dev/null)" ]; then
                echo "ERROR: backend container exited unexpectedly. Last 100 log lines:"
                docker compose logs --tail=100 backend
                exit 1
              fi
              echo "  backend: waiting..."
              sleep 5
            done
            echo "  backend: ready ✓"

      - name: Wait for frontend to be ready
        run: |
          echo "Waiting for frontend (entrypoint: npm install + dev server)..."
          timeout 180 bash -c '
            until curl -sf http://localhost:5173 > /dev/null 2>&1; do
              echo "  frontend: waiting..."
              sleep 5
            done
          '
          echo "  frontend: ready ✓"

      - name: Verify backend health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3000/api/health)
          echo "Backend /api/health responded with HTTP $STATUS"
          [ "$STATUS" = "200" ] || (echo "FAIL: Expected 200, got $STATUS" && exit 1)

      - name: Verify frontend is serving
        run: |
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:5173)
          echo "Frontend :5173 responded with HTTP $STATUS"
          [ "$STATUS" = "200" ] || (echo "FAIL: Expected 200, got $STATUS" && exit 1)

      - name: Verify database was migrated and seeded
        run: |
          COUNT=$(docker compose exec -T backend bundle exec rails runner "puts Character.count")
          echo "Character.count = $COUNT"
          [ "$COUNT" -gt 0 ] || (echo "FAIL: Expected seeded data, got $COUNT characters" && exit 1)

      - name: Verify Redis connectivity
        run: |
          PONG=$(docker compose exec -T redis redis-cli ping)
          echo "Redis ping response: $PONG"
          [ "$PONG" = "PONG" ] || (echo "FAIL: Expected PONG, got $PONG" && exit 1)

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --tail=200

      - name: Tear down
        if: always()
        run: docker compose down -v
