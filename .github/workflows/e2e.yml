name: E2E Smoke Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build all Docker images
        run: docker compose -f docker-compose.e2e.yml build

      - name: Pull infrastructure images
        run: docker compose -f docker-compose.e2e.yml pull postgres redis elasticmq

      - name: Start infrastructure services
        run: docker compose -f docker-compose.e2e.yml up -d postgres redis elasticmq

      - name: Wait for infrastructure to be healthy
        run: |
          echo "Waiting for postgres and redis to be healthy..."
          for svc in postgres redis; do
            echo "  $svc: waiting..."
            timeout 120 bash -c "
              until docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{end}}' \$(docker compose -f docker-compose.e2e.yml ps -q $svc) 2>/dev/null | grep -q healthy; do
                sleep 3
              done
            "
            echo "  $svc: healthy"
          done

      - name: Start application services
        run: docker compose -f docker-compose.e2e.yml up -d backend sidekiq frontend 2>&1 || true

      - name: Wait for backend to be ready
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 8
          max_attempts: 3
          retry_on: error
          on_retry_command: |
            docker compose -f docker-compose.e2e.yml down -v
            docker compose -f docker-compose.e2e.yml up -d postgres redis elasticmq
            echo "Waiting for postgres..."
            timeout 120 bash -c '
              until docker inspect \
                --format="{{if .State.Health}}{{.State.Health.Status}}{{end}}" \
                "$(docker compose -f docker-compose.e2e.yml ps -q postgres)" 2>/dev/null | grep -q healthy; do
                sleep 3
              done
            '
            docker compose -f docker-compose.e2e.yml up -d backend sidekiq frontend 2>&1 || true
          command: |
            echo "Waiting for backend..."
            until curl -sf http://localhost:3000/api/health > /dev/null 2>&1; do
              if [ -n "$(docker compose -f docker-compose.e2e.yml ps --status exited -q backend 2>/dev/null)" ]; then
                echo "ERROR: backend container exited. Last 100 log lines:"
                docker compose -f docker-compose.e2e.yml logs --tail=100 backend
                exit 1
              fi
              echo "  backend: waiting..."
              sleep 5
            done
            echo "  backend: ready"

      - name: Wait for frontend to be ready
        # Timeout rationale: start_period=90s absorbs npm-install + Vite cold start;
        # 210s outer timeout gives 120s beyond that for retries before we give up.
        run: |
          echo "Waiting for frontend container to become healthy..."
          TIMEOUT=210
          ELAPSED=0
          INTERVAL=5
          while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
            CONTAINER_ID=$(docker compose -f docker-compose.e2e.yml ps -q frontend 2>/dev/null | head -1)
            if [ -n "$CONTAINER_ID" ]; then
              STATUS=$(docker inspect \
                --format='{{if .State.Health}}{{.State.Health.Status}}{{end}}' \
                "$CONTAINER_ID" 2>/dev/null)
              if [ "$STATUS" = "healthy" ]; then
                echo "  frontend: healthy (${ELAPSED}s elapsed)"
                exit 0
              fi
              if [ "$STATUS" = "unhealthy" ]; then
                echo "ERROR: frontend container is unhealthy. Last 100 log lines:"
                docker compose -f docker-compose.e2e.yml logs --tail=100 frontend
                exit 1
              fi
              STATE=$(docker inspect --format='{{.State.Status}}' "$CONTAINER_ID" 2>/dev/null)
              if [ "$STATE" = "exited" ]; then
                echo "ERROR: frontend container exited unexpectedly. Last 100 log lines:"
                docker compose -f docker-compose.e2e.yml logs --tail=100 frontend
                exit 1
              fi
              echo "  frontend: $STATUS — ${ELAPSED}s elapsed, waiting..."
            else
              echo "  frontend: container not found yet — ${ELAPSED}s elapsed"
            fi
            sleep "$INTERVAL"
            ELAPSED=$((ELAPSED + INTERVAL))
          done
          echo "ERROR: frontend did not become healthy within ${TIMEOUT}s. Last 100 log lines:"
          docker compose -f docker-compose.e2e.yml logs --tail=100 frontend
          exit 1

      - name: Run Playwright E2E tests
        id: e2e-run
        run: |
          docker compose -f docker-compose.e2e.yml run \
            --rm -T \
            -v "$(pwd)/playwright-report:/e2e/playwright-report" \
            -v "$(pwd)/test-results:/e2e/test-results" \
            playwright

      - name: Upload Playwright report
        if: failure() && steps.e2e-run.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Dump logs on failure
        if: failure()
        run: docker compose -f docker-compose.e2e.yml logs --tail=200

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v
