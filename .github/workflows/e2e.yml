name: E2E Smoke Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Required for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build all Docker images
        run: docker compose -f docker-compose.e2e.yml build

      - name: Pull infrastructure images
        run: docker compose -f docker-compose.e2e.yml pull postgres redis elasticmq

      - name: Start infrastructure services
        run: docker compose -f docker-compose.e2e.yml up -d postgres redis elasticmq

      - name: Wait for infrastructure to be healthy
        run: |
          echo "Waiting for postgres and redis to be healthy..."
          for svc in postgres redis; do
            echo "  $svc: waiting..."
            timeout 120 bash -c "
              until docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{end}}' \$(docker compose -f docker-compose.e2e.yml ps -q $svc) 2>/dev/null | grep -q healthy; do
                sleep 3
              done
            "
            echo "  $svc: healthy"
          done

      - name: Start application services
        run: docker compose -f docker-compose.e2e.yml up -d backend sidekiq frontend 2>&1 || true

      - name: Wait for backend to be ready
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 8
          max_attempts: 3
          retry_on: error
          on_retry_command: |
            docker compose -f docker-compose.e2e.yml down -v
            docker compose -f docker-compose.e2e.yml up -d postgres redis elasticmq
            echo "Waiting for postgres..."
            timeout 120 bash -c '
              until docker inspect \
                --format="{{if .State.Health}}{{.State.Health.Status}}{{end}}" \
                "$(docker compose -f docker-compose.e2e.yml ps -q postgres)" 2>/dev/null | grep -q healthy; do
                sleep 3
              done
            '
            docker compose -f docker-compose.e2e.yml up -d backend sidekiq frontend 2>&1 || true
          command: |
            echo "Waiting for backend..."
            until curl -sf http://localhost:3000/api/health > /dev/null 2>&1; do
              if [ -n "$(docker compose -f docker-compose.e2e.yml ps --status exited -q backend 2>/dev/null)" ]; then
                echo "ERROR: backend container exited. Last 100 log lines:"
                docker compose -f docker-compose.e2e.yml logs --tail=100 backend
                exit 1
              fi
              echo "  backend: waiting..."
              sleep 5
            done
            echo "  backend: ready"

      - name: Wait for frontend to be ready
        # Wait for the Docker healthcheck to mark the frontend as healthy.
        # The healthcheck (node http.get on localhost:5173 inside the container)
        # has a 90 s start_period, so this step may take up to ~2 min.
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_on: error
          on_retry_command: |
            echo "Frontend not ready — tearing down and rebuilding the stack..."
            docker compose -f docker-compose.e2e.yml logs --tail=50 frontend
            docker compose -f docker-compose.e2e.yml down -v
            docker compose -f docker-compose.e2e.yml up -d postgres redis elasticmq
            echo "Waiting for postgres..."
            timeout 120 bash -c '
              until docker inspect \
                --format="{{if .State.Health}}{{.State.Health.Status}}{{end}}" \
                "$(docker compose -f docker-compose.e2e.yml ps -q postgres)" 2>/dev/null | grep -q healthy; do
                sleep 3
              done
            '
            docker compose -f docker-compose.e2e.yml up -d backend sidekiq frontend 2>&1 || true
            echo "Waiting for backend before checking frontend..."
            timeout 180 bash -c '
              until curl -sf http://localhost:3000/api/health > /dev/null 2>&1; do
                sleep 5
              done
            '
          command: |
            echo "Waiting for frontend Docker healthcheck..."
            FE_CID=$(docker compose -f docker-compose.e2e.yml ps -q frontend)
            timeout 300 bash -c "
              while true; do
                STATUS=\$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{end}}' $FE_CID 2>/dev/null || echo 'unknown')
                case \$STATUS in
                  healthy)
                    echo '  frontend: healthy'
                    exit 0
                    ;;
                  unhealthy)
                    echo 'ERROR: frontend marked unhealthy. Last 100 log lines:'
                    docker compose -f docker-compose.e2e.yml logs --tail=100 frontend
                    exit 1
                    ;;
                  *)
                    # Also check if the container exited
                    RUNNING=\$(docker inspect --format='{{.State.Running}}' $FE_CID 2>/dev/null || echo false)
                    if [ \"\$RUNNING\" = 'false' ]; then
                      echo 'ERROR: frontend container exited. Last 100 log lines:'
                      docker compose -f docker-compose.e2e.yml logs --tail=100 frontend
                      exit 1
                    fi
                    echo \"  frontend: \$STATUS — waiting...\"
                    sleep 5
                    ;;
                esac
              done
            "

      - name: Verify inter-container networking
        # Sanity-check that the Playwright container can reach both services
        # via Docker DNS BEFORE we run the full test suite. This catches
        # Docker networking issues that host-level curl cannot detect.
        run: |
          echo "Checking Docker network connectivity from a temporary container..."
          docker compose -f docker-compose.e2e.yml run --rm -T --no-deps \
            --entrypoint="" playwright bash -c '
              echo "=== DNS resolution ==="
              getent hosts frontend || echo "WARNING: cannot resolve frontend"
              getent hosts backend  || echo "WARNING: cannot resolve backend"

              echo ""
              echo "=== Backend connectivity ==="
              node -e "
                const http = require(\"http\");
                http.get(\"http://backend:3000/api/health\", (res) => {
                  console.log(\"  backend: HTTP \" + res.statusCode);
                  process.exit(res.statusCode < 500 ? 0 : 1);
                }).on(\"error\", (e) => {
                  console.error(\"  backend: \" + e.message);
                  process.exit(1);
                });
              "

              echo ""
              echo "=== Frontend connectivity ==="
              node -e "
                const http = require(\"http\");
                http.get(\"http://frontend:5173\", (res) => {
                  console.log(\"  frontend: HTTP \" + res.statusCode);
                  process.exit(res.statusCode < 500 ? 0 : 1);
                }).on(\"error\", (e) => {
                  console.error(\"  frontend: \" + e.message);
                  process.exit(1);
                });
              "

              echo ""
              echo "=== All connectivity checks passed ==="
            '

      - name: Run Playwright E2E tests
        id: e2e-run
        run: |
          docker compose -f docker-compose.e2e.yml run \
            --rm -T --no-deps \
            -v "$(pwd)/playwright-report:/e2e/playwright-report" \
            -v "$(pwd)/test-results:/e2e/test-results" \
            playwright

      - name: Upload Playwright report
        if: ${{ !cancelled() && steps.e2e-run.outcome != 'skipped' }}
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload Playwright screenshots and traces
        if: ${{ !cancelled() && steps.e2e-run.outcome != 'skipped' }}
        uses: actions/upload-artifact@v6
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 14
          if-no-files-found: ignore

      - name: Dump logs on failure
        if: failure()
        run: docker compose -f docker-compose.e2e.yml logs --tail=200

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v

  deploy-report:
    name: Publish Report to GitHub Pages
    needs: e2e
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download Playwright report artifact
        uses: actions/download-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
