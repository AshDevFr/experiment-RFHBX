name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mordors_edge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      RAILS_ENV: test
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        working-directory: .
        run: |
          sudo apt-get update -qq
          sudo apt-get install --no-install-recommends -y libpq-dev

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"
          working-directory: backend

      - name: Ruby and Bundler info
        run: |
          ruby --version
          gem --version
          bundle --version
          cat Gemfile

      - name: Install dependencies
        run: |
          bundle install --jobs 4 --retry 3 2>&1 | tee /tmp/bundle-output.txt
          exit ${PIPESTATUS[0]}
        continue-on-error: true
        id: bundle_install

      - name: Upload bundle output on failure
        if: steps.bundle_install.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: bundle-install-output
          path: /tmp/bundle-output.txt

      - name: Report bundle error
        if: steps.bundle_install.outcome == 'failure'
        run: |
          echo "## Bundle Install Failed" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/bundle-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          exit 1

      - name: Set up database
        run: bundle exec rails db:prepare

      - name: Run RSpec
        run: bundle exec rspec

  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint (Biome)
        run: npx biome check .

      - name: TypeScript check
        run: npx tsc -b --noEmit

      - name: Run tests (Vitest)
        run: npm run test

      - name: Build
        run: npm run build
