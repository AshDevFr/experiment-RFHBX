name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mordors_edge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      RAILS_ENV: test
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      REDIS_URL: redis://localhost:6379/0

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        working-directory: .
        run: |
          sudo apt-get update -qq
          sudo apt-get install --no-install-recommends -y libpq-dev

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.2"
          working-directory: backend

      - name: Install dependencies (frozen — fails if Gemfile.lock is stale)
        run: |
          bundle config set --local frozen true
          bundle install --jobs 4 --retry 3

      - name: Set up database
        run: bundle exec rails db:migrate

      - name: Verify schema.rb is up to date
        run: |
          bundle exec rails db:schema:dump
          git diff --exit-code db/schema.rb || \
            (echo "::error::db/schema.rb is out of date. Run 'rails db:migrate' and commit the updated schema." && exit 1)

      - name: Run RSpec
        run: bundle exec rspec

      - name: Verify swagger spec is up to date
        run: |
          bundle exec rake rswag:specs:swaggerize
          git diff --exit-code swagger/

  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Verify package-lock.json is up to date
        run: |
          git diff --exit-code package-lock.json || \
            (echo "::error::package-lock.json is out of date. Run 'npm install' and commit the updated lockfile." && exit 1)

      - name: Lint (Biome)
        run: npx biome check .

      - name: Build (also generates TanStack Router route tree)
        run: npm run build

      - name: TypeScript check
        run: npx tsc -b --noEmit

      - name: Run tests (Vitest)
        run: npm run test
