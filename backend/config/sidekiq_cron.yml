# Sidekiq Cron Schedule
# Add cron job definitions here. Each key is the job name.
# Format:
#   job_name:
#     cron: "* * * * *"   # cron expression
#     class: MyWorker      # worker class name
#     queue: default       # queue name (optional)
#     args:                # arguments (optional)

quest_tick:
  cron: "* * * * *"
  class: QuestTickWorker
  queue: default
  description: "Advances quest progress every minute when simulation is running"

eye_of_sauron:
  cron: "<%= ENV.fetch('EYE_OF_SAURON_CRON', '* * * * *') %>"
  class: EyeOfSauronWorker
  queue: default
  description: "Sauron's Gaze — scans active regions every minute and creates threat events"

quest_auto_start:
  cron: "<%= ENV.fetch('QUEST_AUTO_START_CRON', '*/5 * * * *') %>"
  class: QuestAutoStartWorker
  queue: critical
  description: "Safety-net: starts the next quest if no quest is active and the simulation is running"
